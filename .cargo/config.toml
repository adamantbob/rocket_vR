[target.thumbv8m.main-none-eabihf]
#runner = "probe-rs run --chip RP235x"
runner = "picotool load -u -v -x -t elf"
# runner = "elf2uf2-rs -d" # For building Click & Drag UF2 files

[target.thumbv6m-none-eabi]
# runner = "picotool load -u -v -x -t elf"
runner = "elf2uf2-rs -d" # For building Click & Drag UF2 files

[alias]
# rocket (new circuit board) — pico2 only
run-pico2 = "run -p rocket_vR --target thumbv8m.main-none-eabihf --features rp2350"
build-pico2 = "build -p rocket_vR --target thumbv8m.main-none-eabihf --features rp2350"
uf2-pico2 = "run -p rocket_vR --target thumbv8m.main-none-eabihf --features rp2350 --config target.thumbv8m.main-none-eabihf.runner='elf2uf2-rs'"
# proto-rocket (original firmware) — pico2 only
run-proto = "run -p proto_rocket_vR --target thumbv8m.main-none-eabihf --features rp2350"
build-proto = "build -p proto_rocket_vR --target thumbv8m.main-none-eabihf --features rp2350"
uf2-proto = "run -p proto_rocket_vR --target thumbv8m.main-none-eabihf --features rp2350 --config target.thumbv8m.main-none-eabihf.runner='elf2uf2-rs'"
run-base = "run -p base-station --target thumbv6m-none-eabi --features rp2040"
build-base = "build -p base-station --target thumbv6m-none-eabi --features rp2040"
uf2-base = "run -p base-station --target thumbv6m-none-eabi --features rp2040 --config target.thumbv6m-none-eabi.runner='elf2uf2-rs'"

[build]

[env]
DEFMT_LOG = "debug"
